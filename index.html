<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Viewer</title>
  <style>
    :root {
      --bg: #0f1724;
      --panel: #172133;
      --panel-2: #1d2b42;
      --line: #2a3a55;
      --text: #d9e3f4;
      --text-dim: #8ea0bf;
      --ok: #2ecc71;
      --warn: #f1c40f;
      --err: #ff6b6b;
      --accent: #4b86ff;
      --led-off: #23334f;
      --led-on: #6fb1ff;
      --led-hole: #111b2d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #223859 0%, var(--bg) 50%);
      color: var(--text);
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    #status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      min-width: 220px;
    }
    #status.connected { border-left: 3px solid var(--ok); }
    #status.disconnected { border-left: 3px solid var(--err); }
    #status.connecting { border-left: 3px solid var(--warn); }

    button {
      background: linear-gradient(180deg, #5e93ff 0%, #3f72ea 100%);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      min-height: calc(100vh - 110px);
    }

    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-title {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .device-list {
      max-height: calc(100vh - 190px);
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .device-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      background: #121d2f;
    }
    .device-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(75, 134, 255, 0.32) inset;
    }
    .device-item .name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .device-item .meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .viewer {
      padding: 12px;
      max-height: calc(100vh - 190px);
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .device-head {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #121d2f;
    }
    .device-head h2 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .device-head p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .output-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #121d2f;
    }
    .output-card h3 {
      font-size: 13px;
      margin-bottom: 4px;
    }
    .output-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .zone {
      border: 1px solid #253855;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: #0f1b2e;
    }
    .zone:last-child { margin-bottom: 0; }
    .zone-title {
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--text-dim);
    }
    .zone-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stage-wrap {
      max-width: 100%;
      overflow: auto;
      padding: 6px 4px 14px;
    }
    .stage {
      position: relative;
      background: #0d1728;
      border: 1px solid #223654;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(49, 78, 120, 0.22);
    }
    .led {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid #2b3f62;
      background: var(--led-off);
      color: #95a7c7;
      font-size: 9px;
      line-height: 18px;
      text-align: center;
      user-select: none;
    }
    .led.active {
      background: linear-gradient(180deg, var(--led-on) 0%, #3d77df 100%);
      border-color: #6fafff;
      color: #f7fbff;
    }
    .led.hole {
      background: var(--led-hole);
      border-color: #1a2942;
      color: transparent;
    }
    .led .coord {
      position: absolute;
      left: 50%;
      bottom: -11px;
      transform: translateX(-50%);
      font-size: 8px;
      color: #88a0c8;
      line-height: 1;
      white-space: nowrap;
    }

    .empty {
      color: var(--text-dim);
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    .log {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
      max-height: 110px;
      overflow-y: auto;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #101a2a;
    }
    .log div {
      padding: 2px 0;
      border-bottom: 1px solid rgba(39, 58, 88, 0.45);
    }
    .log div:last-child { border-bottom: none; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .device-list, .viewer { max-height: none; }
    }
  </style>
</head>
<body>
  <h1>Device Viewer — 实时设备网格布局</h1>
  <div class="toolbar">
    <div id="status" class="connecting">连接中...</div>
    <button id="refresh">刷新设备</button>
  </div>
  <div class="layout">
    <div class="panel">
      <div class="panel-title">设备列表</div>
      <div id="device-list" class="device-list">
        <div class="empty">暂无设备</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">网格预览</div>
      <div id="viewer" class="viewer">
        <div class="empty">请选择设备</div>
      </div>
    </div>
  </div>
  <div id="log" class="log"></div>

  <script>
    const PAGE = window.__SKYDIMO_EXT_PAGE__ || {};
    const EXT_ID = PAGE.extId || 'led_canvas';
    const WS_URL = PAGE.wsUrl || 'ws://127.0.0.1:42070';

    let ws = null;
    let rpcId = 1;
    let devicesCache = [];
    let selectedPort = null;
    let lastSnapshotHash = "";

    function log(msg) {
      const el = document.getElementById('log');
      const d = document.createElement('div');
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.prepend(d);
      while (el.children.length > 50) el.removeChild(el.lastChild);
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls;
    }

    function send(method, params) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const msg = { jsonrpc: '2.0', id: rpcId++, method, params };
      ws.send(JSON.stringify(msg));
    }

    function requestDevices() {
      send('ext_page_send', { extId: EXT_ID, data: { type: 'get_devices' } });
    }

    function updateSnapshot(devices, source) {
      const normalized = Array.isArray(devices) ? devices : [];
      const hash = JSON.stringify(normalized);
      if (hash === lastSnapshotHash) return;
      lastSnapshotHash = hash;
      devicesCache = normalized;

      if (!selectedPort || !devicesCache.some((d) => d.port === selectedPort)) {
        selectedPort = devicesCache[0] ? devicesCache[0].port : null;
      }

      renderDeviceList();
      renderViewer();
      log(`设备快照已更新 (${source})，共 ${devicesCache.length} 台设备`);
    }

    function renderDeviceList() {
      const list = document.getElementById('device-list');
      if (!devicesCache.length) {
        list.innerHTML = '<div class="empty">暂无设备</div>';
        return;
      }
      list.innerHTML = devicesCache.map((dev) => {
        const name = dev.model || dev.description || dev.name || dev.id || '(unknown)';
        const outputs = Array.isArray(dev.outputs) ? dev.outputs.length : 0;
        const isActive = selectedPort === dev.port ? 'active' : '';
        return `
          <div class="device-item ${isActive}" data-port="${escAttr(dev.port || '')}">
            <div class="name">${esc(name)}</div>
            <div class="meta">Port: ${esc(dev.port || '-')} · Outputs: ${outputs}</div>
            <div class="meta">ID: ${esc(dev.id || '-')}</div>
          </div>
        `;
      }).join('');

      for (const el of list.querySelectorAll('.device-item')) {
        el.addEventListener('click', () => {
          selectedPort = el.getAttribute('data-port');
          renderDeviceList();
          renderViewer();
        });
      }
    }

    function renderViewer() {
      const viewer = document.getElementById('viewer');
      if (!devicesCache.length) {
        viewer.innerHTML = '<div class="empty">暂无设备可展示</div>';
        return;
      }

      const dev = devicesCache.find((d) => d.port === selectedPort) || devicesCache[0];
      if (!dev) {
        viewer.innerHTML = '<div class="empty">请选择设备</div>';
        return;
      }

      const deviceName = dev.model || dev.description || dev.name || dev.id || '(unknown)';
      const outputs = Array.isArray(dev.outputs) ? dev.outputs : [];

      let html = `
        <div class="device-head">
          <h2>${esc(deviceName)}</h2>
          <p>Port: ${esc(dev.port || '-')} · Serial: ${esc(dev.serial_id || '-')} · Outputs: ${outputs.length}</p>
        </div>
      `;

      if (!outputs.length) {
        html += '<div class="empty">该设备没有输出口数据</div>';
        viewer.innerHTML = html;
        return;
      }

      for (const output of outputs) {
        const zones = collectZones(output);
        html += `
          <div class="output-card">
            <h3>${esc(output.name || output.id || '(output)')}</h3>
            <div class="output-meta">
              id=${esc(output.id || '-')} · type=${esc(output.output_type || '-')} · leds=${num(output.leds_count)}
            </div>
        `;
        for (const zone of zones) {
          html += `<div class="zone">`;
          html += `<div class="zone-title">${esc(zone.title)}</div>`;
          html += `<div class="zone-hint">${zone.matrix ? '矩阵坐标映射：x=列, y=行' : '线性布局：坐标为可视网格坐标（非设备原生坐标）'}</div>`;
          html += renderZoneStage(zone);
          html += `</div>`;
        }
        html += `</div>`;
      }

      viewer.innerHTML = html;
    }

    function collectZones(output) {
      const segments = Array.isArray(output.segments) ? output.segments : [];
      if (!segments.length) {
        return [{
          title: `${output.name || output.id || 'output'} (整体)`,
          type: output.output_type,
          ledsCount: num(output.leds_count),
          matrix: output.matrix,
        }];
      }
      return segments.map((seg) => ({
        title: `${seg.name || seg.id || 'segment'} · ${seg.segment_type} · leds=${num(seg.leds_count)}`,
        type: seg.segment_type,
        ledsCount: num(seg.leds_count),
        matrix: seg.matrix,
      }));
    }

    function renderZoneStage(zone) {
      const CELL = 26;
      const PAD = 10;
      const matrix = normalizeMatrix(zone.matrix);
      if (matrix) {
        const stageWidth = PAD * 2 + matrix.width * CELL;
        const stageHeight = PAD * 2 + matrix.height * CELL;
        let html = `<div class="stage-wrap"><div class="stage" style="width:${stageWidth}px;height:${stageHeight}px">`;
        for (let i = 0; i < matrix.map.length; i++) {
          const mapped = matrix.map[i];
          const x = i % matrix.width;
          const y = Math.floor(i / matrix.width);
          const left = PAD + x * CELL;
          const top = PAD + y * CELL;
          if (mapped < 0) {
            html += `<div class="led hole" style="left:${left}px;top:${top}px"></div>`;
          } else {
            html += `<div class="led active" style="left:${left}px;top:${top}px" title="x=${x}, y=${y}, LED=${mapped}">${mapped}<span class="coord">(${x},${y})</span></div>`;
          }
        }
        html += `</div></div>`;
        return html;
      }

      const ledsCount = Math.max(0, num(zone.ledsCount));
      if (!ledsCount) return '<div class="empty">LED 数量为 0</div>';

      const cols = Math.min(16, Math.max(1, Math.ceil(Math.sqrt(ledsCount))));
      const rows = Math.ceil(ledsCount / cols);
      const stageWidth = PAD * 2 + cols * CELL;
      const stageHeight = PAD * 2 + rows * CELL;
      let html = `<div class="stage-wrap"><div class="stage" style="width:${stageWidth}px;height:${stageHeight}px">`;
      for (let i = 0; i < ledsCount; i++) {
        const x = i % cols;
        const y = Math.floor(i / cols);
        const left = PAD + x * CELL;
        const top = PAD + y * CELL;
        html += `<div class="led active" style="left:${left}px;top:${top}px" title="x=${x}, y=${y}, LED=${i}">${i}<span class="coord">(${x},${y})</span></div>`;
      }
      html += '</div></div>';
      return html;
    }

    function normalizeMatrix(raw) {
      if (!raw || typeof raw !== 'object') return null;
      const width = num(raw.width);
      const height = num(raw.height);
      const map = Array.isArray(raw.map) ? raw.map : [];
      if (!width || !height || map.length !== width * height) return null;
      return { width, height, map };
    }

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function esc(s) {
      const d = document.createElement('span');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function escAttr(s) {
      return esc(s).replace(/"/g, '&quot;');
    }

    function connect() {
      if (ws) { try { ws.close(); } catch (_) {} }
      setStatus('连接中...', 'connecting');
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus('已连接', 'connected');
        log('WebSocket 已连接');
        requestDevices();
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch (e) { return; }

        // Event notifications (no id field, method = "event")
        if (msg.method === 'event' && msg.params) {
          const event = msg.params.event;
          const data = msg.params.data;

          // Direct devices-changed event from core
          if (event === 'devices-changed') {
            updateSnapshot(data, 'broadcast:devices-changed');
            return;
          }

          // Extension-specific page messages
          if (event === 'ext-page-message:' + EXT_ID) {
            if (data && data.type === 'devices') {
              updateSnapshot(data.data, 'ext.page_emit');
            }
            return;
          }
        }
      };

      ws.onclose = () => {
        setStatus('已断开，3 秒后重连...', 'disconnected');
        log('WebSocket 连接关闭');
        setTimeout(connect, 3000);
      };

      ws.onerror = (err) => {
        log('WebSocket 错误');
      };
    }

    document.getElementById('refresh').addEventListener('click', requestDevices);

    // Start connection
    connect();
  </script>
</body>
</html>
